<!DOCTYPE html>

<html>
    <head>
        <title>IF Statement</title>
        <script>
            let name;
            let now = new Date(); // current date and time
            let hour = now.getHours(); // current hour (0 to 23)

            // read the name from the prompt box as a string
            name = window.prompt("Please enter your name");

            // determine whether it's morning
            if (hour < 12) {
                document.write("<h1>Good Morning, ");
            }

            // determine whether the time is PM
            if (hour >= 12) {
                // convert to a 12-hour clock
                hour = hour - 12;

                // determine whether it's before 6PM
                if (hour < 6) {
                    document.write("<h1>Good Afternoon, ");
                }

                // determine whether it's after 6PM
                if (hour >= 6) {
                    document.write("<h2>Good Evening, ");
                }
            } // end if

            document.writeln(name +
                ", welcome to JS class!</h2>"
            );
        </script>
    </head><body></body>
</html>
