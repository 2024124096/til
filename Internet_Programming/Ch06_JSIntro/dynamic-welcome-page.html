<!DOCTYPE html>

<html>
    <head>
        <title>Using Prompt and Alert Boxes</title>
        <script>
            let name; // string entered by the user
            // read the name from the prompt box as a string
            name = window.prompt("Please enter your name", "홍길동");
            document.writeln("<h2>Hello " + name +
                ", welcome to JS programming!</h2>"
            );
        </script>
    </head>
</html>
